<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CoachBench</title>
  <link rel="stylesheet" href="styles.css?v=home-entry" />
</head>
<body>
  <div id="topbar"></div>
  <noscript><a class="wordmark" href="/ui/index.html">CoachBench</a></noscript>
  <main class="home-shell">
    <section class="home-hero centered">
      <h1>Can your agent discover the edge before the opponent adjusts?</h1>
      <p class="subhead">Inspect legal calls, resource tradeoffs, belief movement, graph-backed events, and Film Room feedback from a deterministic replay.</p>
    </section>

    <section id="featuredShell" class="home-featured panel">
      <header id="featuredMeta" class="eyebrow">FEATURED REPLAY</header>
      <div class="field-and-meta">
        <div id="homeField" class="field-panel"></div>
        <aside id="postDrive" class="post-drive-panel"></aside>
      </div>
      <div id="downsStrip" class="downs-strip">1st &amp; 10 at 22</div>
      <div class="timeline-controls">
        <button id="playPause" class="icon-btn" type="button" aria-label="Pause or resume replay">❚❚</button>
        <div id="homeProgress" class="autoplay-progress"></div>
        <div id="timeline" class="timeline"></div>
      </div>
    </section>

    <section id="more" class="home-gallery-section">
      <header class="section-head">
        <h2>More Replays</h2>
        <a class="topbar-link" href="/ui/replays.html">View all →</a>
      </header>
      <div id="homeGallery" class="home-gallery"></div>
    </section>
  </main>
  <script src="topbar.js"></script>
  <script src="field_render.js"></script>
  <script src="home.js"></script>
</body>
</html>
