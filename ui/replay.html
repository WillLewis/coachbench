<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CoachBench Replay</title>
  <link rel="stylesheet" href="styles.css?v=p0-4-shell-v1" />
  <script>
    (() => {
      const query = new URLSearchParams(location.search);
      const seed = query.get('seed');
      const hash = location.hash && location.hash !== '#'
        ? location.hash
        : `#/replays/${encodeURIComponent(seed ? `seed-${seed}` : 'seed-42')}`;
      location.replace(`app.html${hash}`);
    })();
  </script>
</head>
<body>
  <div id="topbar"></div>
  <main class="shell">
    <p><a class="wordmark" href="/ui/index.html">CoachBench</a></p>
    <p><a class="topbar-link" href="/ui/app.html#/replays/seed-42">Open replay detail</a></p>
  </main>
  <script src="topbar.js"></script>
</body>
</html>
